spring:
  datasource:
    url: jdbc:h2:file:./data/mymanus;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: update  # Keep data between restarts
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:sk-ant-dummy-key-for-testing}  # Optional for testing without AI

sandbox:
  mode: host
  host:
    python-executable: python3
    workspace-dir: /home/ubuntu/MY-Manus/backend/workspace
    timeout-seconds: 30

auth:
  enabled: false

cors:
  allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:8081

logging:
  level:
    root: INFO
    ai.mymanus: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
