# Spring Boot Application Configuration for MY-Manus

# Application Info
spring.application.name=my-manus
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/mymanus
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Spring AI Configuration
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-3-5-sonnet-20241022
spring.ai.anthropic.chat.options.temperature=0.7
spring.ai.anthropic.chat.options.max-tokens=4096

# Agent Configuration
agent.max-iterations=20
agent.execution-timeout=30000

# Sandbox Configuration
sandbox.mode=docker
sandbox.workspace-path=/workspace
sandbox.network-enabled=true

# RAG Configuration
rag.top-k=5

# WebSocket Configuration
spring.websocket.allowed-origins=*

# Actuator/Management Endpoints for Prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Metrics Configuration
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=production
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles-histogram.spring.ai.chat.client.call.duration=true

# Logging
logging.level.root=INFO
logging.level.ai.mymanus=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Scheduling
spring.task.scheduling.pool.size=5
