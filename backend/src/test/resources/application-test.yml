spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  h2:
    console:
      enabled: false
  ai:
    anthropic:
      api-key: test-api-key-for-integration-tests

sandbox:
  mode: mock
  docker:
    image: mymanus-sandbox:latest
    memory-limit: 536870912
    cpu-quota: 50000
    timeout-seconds: 30
    network-mode: none

agent:
  max-iterations: 20

logging:
  level:
    ai.mymanus: DEBUG
