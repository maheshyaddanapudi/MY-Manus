version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: mymanus-postgres
    environment:
      POSTGRES_DB: mymanus
      POSTGRES_USER: mymanus
      POSTGRES_PASSWORD: mymanus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mymanus"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mymanus-network

  # Backend Spring Boot Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mymanus-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mymanus
      DB_USER: mymanus
      DB_PASSWORD: mymanus
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AUTH_ENABLED: false
      DOCKER_HOST: unix:///var/run/docker.sock
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mymanus-network
    command: ./mvnw spring-boot:run -Dspring.profiles.active=dev

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mymanus-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:8080/ws
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - mymanus-network
    command: npm run dev -- --host

volumes:
  postgres_data:
    driver: local

networks:
  mymanus-network:
    driver: bridge
